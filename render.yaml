services:
  - type: web
    name: video-clipper
    env: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 600 --workers 1 --bind 0.0.0.0:$PORT
    disk:
      name: workspace
      mountPath: /opt/render/project/src/workspace
      sizeGB: 10
